server.port=8080
server.servlet.context-path=/

# RL Inference Service Configuration
rl.inference.service.url=http://localhost:8000/predict_action
rl.inference.service.timeout=10000
rl.inference.observation-dimension=9

# Spring Boot Configuration
spring.application.name=traffic-control-gateway
logging.level.root=INFO
logging.level.com.example.gateway=DEBUG

# Connection pool configuration
spring.http.client.connect-timeout=5000
spring.http.client.read-timeout=10000

api.title=AI Traffic Control API
api.description=REST API Gateway for RL-based traffic signal control
api.version=1.0.0